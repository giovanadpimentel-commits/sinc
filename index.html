<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SINC – Sistema de Notificação de Cessão de Crédito</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --bg: #F4F3EF;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --text: #1A1A1A;
      --text-muted: #666660;
      --text-faint: #999994;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .app-header {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card {
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-size: 13px;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 14px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
    }

    .btn {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--blue);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
    }

  </style>
</head>

<body>

  <div class="app-header">

    <div class="logo">S</div>

    <div class="header-text">
      <h1>SINC</h1>
      <p>Sistema de Notificação de Cessão de Crédito</p>
    </div>

  </div>

  <div class="card">

    <div class="card-label">
      <span class="step-num">1</span>
      Leitura da Nota Fiscal
    </div>

    <div class="hint">
      Selecione um PDF da nota fiscal.
      O sistema irá identificar automaticamente:
      emitente, destinatário, número da NF,
      valor e vencimento.
    </div>

    <input type="file" id="pdf-upload" accept="application/pdf">

    <textarea
      id="resultado"
      placeholder="As informações extraídas aparecerão aqui..."
    ></textarea>

    <button class="btn" onclick="extrairDados()">
      Extrair dados automaticamente
    </button>

  </div>

  <div class="footer">
    SINC v1.0 — PUC Goiás · CMP 1280 Engenharia de Software
  </div>

<script>

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let textoPdfCompleto = '';

  async function extrairTextoPDF(file) {

    const resultado = document.getElementById('resultado');

    resultado.value = 'Lendo PDF...';

    try {

      const arrayBuffer = await file.arrayBuffer();

      const pdf = await pdfjsLib.getDocument({
        data: arrayBuffer
      }).promise;

      textoPdfCompleto = '';

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

        resultado.value =
          `Lendo página ${pageNum} de ${pdf.numPages}...`;

        const page = await pdf.getPage(pageNum);

        const textContent = await page.getTextContent();

        const textoPagina = textContent.items
          .map(item => item.str)
          .join(' ');

        textoPdfCompleto += textoPagina + '\n\n';
      }

      resultado.value =
`PDF carregado com sucesso.

Clique em "Extrair dados automaticamente".`;

    } catch (erro) {

      console.error(erro);

      resultado.value = '';

      alert(
        'Não foi possível ler este PDF.\n\n' +
        'O arquivo pode ser escaneado ou incompatível.'
      );
    }

  }

  document
    .getElementById('pdf-upload')
    .addEventListener('change', async (event) => {

      const file = event.target.files[0];

      if (!file) return;

      await extrairTextoPDF(file);

    });

  function encontrarValor(texto) {

    const regex =
      /R\$\s?[\d\.\,]+/g;

    const encontrados = texto.match(regex);

    return encontrados ? encontrados[0] : '-';
  }

  function encontrarNumeroNF(texto) {

    const regex =
      /(NF|NOTA FISCAL|Nº|NUMERO)[^\d]{0,10}(\d{3,})/i;

    const match = texto.match(regex);

    return match ? match[2] : '-';
  }

  function encontrarData(texto) {

    const regex =
      /\d{2}\/\d{2}\/\d{4}/g;

    const datas = texto.match(regex);

    return datas ? datas[datas.length - 1] : '-';
  }

  function encontrarEmitente(texto) {

    const linhas = texto.split('\n');

    for (let linha of linhas) {

      if (
        linha.toUpperCase().includes('LTDA') ||
        linha.toUpperCase().includes('S/A') ||
        linha.toUpperCase().includes('ME')
      ) {
        return linha.trim();
      }
    }

    return '-';
  }

  function encontrarDestinatario(texto) {

    const linhas = texto.split('\n');

    for (let linha of linhas) {

      if (
        linha.toUpperCase().includes('DESTINATÁRIO') ||
        linha.toUpperCase().includes('CLIENTE')
      ) {
        return linha.trim();
      }
    }

    return '-';
  }

  function extrairDados() {

    if (!textoPdfCompleto.trim()) {

      alert('Selecione um PDF primeiro.');

      return;
    }

    const emitente =
      encontrarEmitente(textoPdfCompleto);

    const destinatario =
      encontrarDestinatario(textoPdfCompleto);

    const numeroNF =
      encontrarNumeroNF(textoPdfCompleto);

    const valor =
      encontrarValor(textoPdfCompleto);

    const vencimento =
      encontrarData(textoPdfCompleto);

    document.getElementById('resultado').value =
`EMITENTE:
${emitente}

DESTINATÁRIO:
${destinatario}

NÚMERO DA NF:
${numeroNF}

VALOR:
${valor}

VENCIMENTO:
${vencimento}`;

  }

</script>

</body>
</html>
